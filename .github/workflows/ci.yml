name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true  # Don't block CI on lint warnings initially

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ':memory:'
          APP_PASSWORD: ''

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: next-build
          path: .next/
          retention-days: 1
