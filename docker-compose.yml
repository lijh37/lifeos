# LifeOS 自托管部署（Docker Compose）
# 架构：nginx 反代 → next 容器；数据持久化到 volumes
#
# 临时访问（备案前）：http://<服务器IP>:3000
# 备案后：改 nginx 配置切到 :80/:443 + 域名，见 DEPLOY.md

services:
  next:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lifeos-next
    restart: unless-stopped
    # 放宽 seccomp，规避 npm 构建期信号处理异常
    security_opt:
      - seccomp:unconfined
    environment:
      # ── 数据库：本地 SQLite（解耦 Turso）──
      - DATABASE_URL=file:./data/db/lifeos.db
      # 清空 Turso 变量，确保 getClient() 走本地 SQLite
      - TURSO_DATABASE_URL=
      - TURSO_AUTH_TOKEN=
      # ── 存储：本地磁盘（解耦 Vercel Blob）──
      - STORAGE_DRIVER=local
      - UPLOAD_DIR=/app/data/uploads
      - UPLOAD_URL_PREFIX=/uploads
      # ── 认证 ──
      - APP_PASSWORD=${APP_PASSWORD:-demo}
      # ── 其他 ──
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    volumes:
      # 数据库 + 附件，持久化到命名 volume（换机器只需备份此 volume）
      - lifeos-data:/app/data
    expose:
      - "3000"
    # 启动后执行迁移（建表），失败则容器退出
    command: sh -c "npm run migrate && npm run start"

  nginx:
    image: nginx:alpine
    container_name: lifeos-nginx
    restart: unless-stopped
    ports:
      # 临时访问端口（备案前用，不受备案限制）
      - "3000:3000"
      # 备案通过后取消注释，并改 nginx/lifeos.conf 为 80/443
      # - "80:80"
      # - "443:443"
    volumes:
      - ./nginx/lifeos.conf:/etc/nginx/conf.d/default.conf:ro
      # 附件静态目录：与 next 容器共享同一 volume，由 nginx 直出（更快）
      - lifeos-data:/app/data:ro
    depends_on:
      - next

volumes:
  lifeos-data:
    driver: local
