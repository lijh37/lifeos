# LifeOS Nginx 配置
# 临时方案：监听 3000（备案前用 IP:3000 访问，不受备案限制）
# 备案后：取消下方 :80/:443 server 块注释，并 docker-compose 放开 80/443 端口映射

server {
    listen 3000;
    # 备案后改为 server_name your-domain.com;
    server_name _;

    # 客户端上传上限（匹配附件 10MB 限制，留余量）
    client_max_body_size 12m;

    # ── 附件静态直出（本地磁盘，nginx 直接服务，绕过 Node）──
    # URL 形如 /uploads/<uuid>.<ext>
    location /uploads/ {
        alias /app/data/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # 防止目录遍历
        autoindex off;
    }

    # ── 反代到 Next.js 容器 ──
    location / {
        proxy_pass http://next:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

